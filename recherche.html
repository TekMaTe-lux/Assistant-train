<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test Recherche Bétaillère</title>
<style>
body {
  font-family: Arial;
  background: #0b0f1a;
  color: white;
  padding: 20px;
}
input, button {
  padding: 8px;
  margin: 5px;
}
.result {
  background: #111827;
  padding: 10px;
  margin: 5px 0;
  border-left: 4px solid #00d4ff;
}
.sncf { border-color: #00d4ff; }
.cfl { border-color: #00ff88; }
</style>
</head>

<body>

<h2>🐮 Test recherche trains VPS</h2>

<div>
  Départ : <input id="from" value="Luxembourg">
  Arrivée : <input id="to" value="Metz"><br>

  Date : <input id="date" value="20260504"><br>

  Heure début : <input id="start" value="09:00">
  Heure fin : <input id="end" value="13:00"><br>

  <button onclick="search()">🔍 Rechercher</button>
</div>

<hr>

<div id="results"></div>

<script>
async function search() {
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;
  const date = document.getElementById("date").value;
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  const url = `https://vps.labetaillere.fr/sncf/api/search-static?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}&date=${date}&start=${start}&end=${end}&includeCfl=1`;

  const res = await fetch(url);
  const data = await res.json();

  const container = document.getElementById("results");
  container.innerHTML = `<b>${data.count} résultats</b><br><br>`;

  data.results.forEach(r => {
    const div = document.createElement("div");
    div.className = "result " + r.source;

    div.innerHTML = `
      <b>${r.displayLabel}</b> (${r.source.toUpperCase()})<br>
      ${r.from} → ${r.to}<br>
      🕒 ${r.dep} → ${r.arr} (${r.durationMin} min)
    `;

    container.appendChild(div);
  });
}
</script>

</body>
</html>
