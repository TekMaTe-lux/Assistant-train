<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>La B&eacute;taill&egrave;re - P&eacute;tition</title>
  <meta name="description" content="Acc&egrave;s &agrave; La B&eacute;taill&egrave;re avec un bandeau de soutien &agrave; la p&eacute;tition." />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f1a;
      --cyan: #00f0ff;
      --yellow: #ffe600;
      --text: #e0f0ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .petition-banner {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      width: 100%;
      padding: 12px clamp(14px, 3vw, 28px);
      border-bottom: 1px solid rgba(255, 230, 0, 0.65);
      background: linear-gradient(135deg, rgba(255, 230, 0, 0.16), rgba(0, 240, 255, 0.1)), #0b0f1a;
      box-shadow: 0 2px 16px rgba(255, 230, 0, 0.14);
    }

    .petition-banner p {
      margin: 0;
      line-height: 1.4;
      font-size: 0.95rem;
      text-align: center;
    }

    .petition-banner strong {
      color: var(--yellow);
    }

    .petition-banner a {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 9px 15px;
      border-radius: 8px;
      background: var(--yellow);
      color: #05070d;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 0 10px rgba(255, 230, 0, 0.42);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
      white-space: nowrap;
    }

    .petition-banner a:hover,
    .petition-banner a:focus-visible {
      background: #fff15a;
      box-shadow: 0 0 18px rgba(255, 230, 0, 0.65);
      transform: translateY(-1px);
    }

    .petition-banner a:focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 3px;
    }

    .site-frame {
      flex: 1 1 auto;
      width: 100%;
      min-height: 0;
      border: 0;
      background: var(--bg);
    }

    @media (max-width: 640px) {
      .petition-banner {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        padding: 12px 14px;
      }

      .petition-banner p {
        font-size: 0.86rem;
      }

      .petition-banner a {
        width: 100%;
        min-height: 44px;
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <aside class="petition-banner" aria-label="Petition pour les usagers du train">
    <p><strong>P&eacute;tition ouverte :</strong> soutenez l'am&eacute;lioration des conditions pour les usagers du rail.</p>
    <a href="https://www.petitiounen.lu/fr/petition/4103" target="_blank" rel="noopener">Signer la p&eacute;tition</a>
  </aside>
  <iframe class="site-frame" src="indexSAUV.html" title="La B&eacute;taill&egrave;re"></iframe>
</body>
</html>
